DOCTYPE html>
<html>
<head>
  <title>My Personal Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      scroll-behavior: smooth;
    }

    /* NAV BAR */
    nav {
      background: #2c3e50;
      padding: 15px;
      position: sticky;
      top: 0;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    /* SECTIONS */
    section {
      padding: 60px 20px;
      text-align: center;
    }

    #home {
      background: #f2f2f2;
    }

    #about {
      background: #ffffff;
    }

    #contact {
      background: #f2f2f2;
    }

    h1 {
      color: #2c3e50;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #3498db;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }
  </style>
</head>

<body>

  <!-- NAVIGATION -->
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- HOME -->
  <section id="home">
    <h1>Welcome to My Website 😎</h1>
    <p>I built this using just my phone</p>
    <button onclick="alert('You clicked my website!')">Click Me</button>
  </section>

  <!-- ABOUT -->
  <section id="about">
    <h1>About Me</h1>
    <p>I am learning web development step by step. This is my first real project.</p>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h1>Contact</h1>
    <p>Email: ojongndipetta57@gmail.com</p>
  </section>

</body>
</html>
