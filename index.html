<!DOCTYPE html>
<html>
<head>
  <title>My Personal Website</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      scroll-behavior: smooth;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: rgba(15, 23, 42, 0.9);
      padding: 15px;
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
    }

    nav a {
      color: #e2e8f0;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }

    /* HERO SECTION */
    .hero {
      padding: 100px 20px;
      text-align: center;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #94a3b8;
    }

    /* BUTTON */
    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    /* SECTIONS */
    section {
      padding: 60px 20px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    /* CARD STYLE */
    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      max-width: 400px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- HERO -->
  <div class="hero" id="home">
    <h1>Welcome 😎</h1>
    <p>I built this website using just my phone</p>
    <button class="btn" onclick="alert('Welcome to my world!')">
      Explore
    </button>
  </div>

  <!-- ABOUT -->
  <section id="about">
    <h2>About Me</h2>

    <div class="card">
      <p>
        I’m learning web development step by step.  
        I enjoy anime, games, and building cool stuff.
      </p>
    </div>

  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Contact</h2>

    <div class="card">
      <p>Email: ojongndipetta57@gmail.com</p>
    </div>

  </section>

</body>
</html>
